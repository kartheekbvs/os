<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Security & Protection | Linux OS Academy</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Sans:wght@400;600;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">

  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body class="app-container">

  <div id="sidebar-mount"></div>

  <main class="main-content">
    <div id="topbar-mount"></div>

    <div class="page-container" id="content-mount">
      <div class="skeleton skeleton--title"></div>
      <div class="skeleton skeleton--text"></div>
      <div class="skeleton skeleton--text-short"></div>
      <div class="skeleton skeleton--card mt-6"></div>
    </div>
  </main>

  <div id="command-palette-mount"></div>

  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

  <script type="module">
    async function loadLayout() {
      const [sidebarRes, topbarRes, cmdPaletteRes] = await Promise.all([
        fetch('components/sidebar.html'),
        fetch('components/topbar.html'),
        fetch('components/command-palette.html')
      ]);
      
      document.getElementById('sidebar-mount').innerHTML = await sidebarRes.text();
      document.getElementById('topbar-mount').innerHTML = await topbarRes.text();
      document.getElementById('command-palette-mount').innerHTML = await cmdPaletteRes.text();

      const bc = document.getElementById('breadcrumb-current');
      if (bc) bc.textContent = 'OS Security';
      
      const activeLink = document.querySelector('.nav-link[data-id="os-security"]');
      if (activeLink) activeLink.classList.add('active');
    }

    import { ContentRenderer } from './assets/js/content-renderer.js';
    import { ToastManager } from './assets/js/toast-manager.js';
    import { KeyboardShortcuts } from './assets/js/keyboard-shortcuts.js';
    import { CommandPalette } from './assets/js/command-palette.js';
    import './assets/js/core.js';

    document.addEventListener('DOMContentLoaded', async () => {
      await loadLayout();
      
      ToastManager.init();
      KeyboardShortcuts.init();
      CommandPalette.init();

      new ContentRenderer('#content-mount', 'assets/data/concepts/os-security.json');
    });
  </script>
</body>
</html>
