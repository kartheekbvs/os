<!-- Command Palette Component -->
<div id="command-palette-overlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[1000] hidden items-start justify-center pt-20" aria-modal="true" role="dialog">
  <div class="bg-bg-surface border border-border-strong rounded-xl shadow-lg w-full max-w-2xl overflow-hidden flex flex-col transform transition-transform scale-95 opacity-0" id="command-palette-modal">
    
    <div class="flex items-center px-4 border-b border-border-subtle">
      <i class="fas fa-search text-text-muted"></i>
      <input type="text" id="command-palette-input" class="w-full bg-transparent border-none px-4 py-4 text-text-primary focus:outline-none text-lg" placeholder="Search commands, topics, or jump to... (Ctrl+K)">
      <span class="text-xs text-text-muted font-mono border border-border-subtle px-1 rounded">ESC</span>
    </div>

    <div class="max-h-96 overflow-y-auto p-2" id="command-palette-results">
      <!-- Results injected here -->
      <div class="p-3 text-sm text-text-muted text-center" data-slot="empty-state">
        Type to start searching across the entire OS Academy...
      </div>
    </div>
    
  </div>
</div>
